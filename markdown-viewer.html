<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #header {
      padding: 16px;
      border-bottom: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
    }
    #header h1 {
      margin-bottom: 6px;
      color: #fff;
    }
    #header a {
      color: #4a9eff;
      text-decoration: none;
    }
    #header a:hover {
      color: #6bb0ff;
      text-decoration: underline;
    }
    #controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    #url-input {
      flex: 1 1 400px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #555;
      background: #111;
      color: #e0e0e0;
      font-size: 14px;
    }
    #load-button {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e0e0e0;
      cursor: pointer;
    }
    #load-button:hover {
      background: #3a3a3a;
    }
    #content {
      flex: 1;
      overflow: auto;
      padding: 20px;
    }
    #status {
      margin-bottom: 12px;
      color: #aaa;
    }
    #source-link {
      color: #6bb0ff;
      text-decoration: none;
    }
    #source-link:hover {
      text-decoration: underline;
    }
    #markdown {
      max-width: 960px;
      margin: 0 auto;
      line-height: 1.6;
      font-size: 16px;
    }
    #markdown h1,
    #markdown h2,
    #markdown h3,
    #markdown h4,
    #markdown h5,
    #markdown h6 {
      margin: 20px 0 10px;
      color: #fff;
    }
    #markdown p {
      margin: 10px 0;
    }
    #markdown a {
      color: #4a9eff;
      text-decoration: none;
    }
    #markdown a:hover {
      text-decoration: underline;
    }
    #markdown code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      background: #101010;
      padding: 2px 4px;
      border-radius: 4px;
      border: 1px solid #333;
      color: #eaeaea;
    }
    #markdown pre {
      background: #0d0d0d;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      margin: 14px 0;
    }
    #markdown pre code {
      background: none;
      padding: 0;
      border: none;
      color: inherit;
    }
    #markdown blockquote {
      border-left: 3px solid #4a9eff;
      padding-left: 12px;
      color: #cfcfcf;
      margin: 12px 0;
    }
    #markdown ul,
    #markdown ol {
      margin: 10px 0 10px 24px;
    }
    #markdown hr {
      border: none;
      border-top: 1px solid #444;
      margin: 18px 0;
    }
    .notice {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #555;
      background: rgba(50, 50, 50, 0.6);
    }
    .error {
      border-color: #b84a4a;
      color: #ff8a8a;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>Markdown Viewer</h1>
      <a href="index.html">← Back to Main App</a>
      <form id="controls">
        <input id="url-input" type="url" placeholder="https://example.com/file.md" aria-label="Markdown URL" />
        <button id="load-button" type="submit">Load</button>
      </form>
    </div>
    <div id="content">
      <div id="status" class="notice">Provide a URL to a markdown file using the field above or a `?url=` query parameter.</div>
      <div id="markdown"></div>
    </div>
  </div>
  <script type="module" src="/src/apps/markdown-viewer/index.ts"></script>
</body>
</html>
