<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Statistics - Grid Drawing App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #header {
      padding: 12px 16px;
      border-bottom: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
    }
    #header h1 {
      margin-bottom: 6px;
      color: #fff;
    }
    #header a {
      color: #4a9eff;
      text-decoration: none;
    }
    #header a:hover {
      color: #6bb0ff;
      text-decoration: underline;
    }
    #content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #tweakpane-container {
      width: 300px;
      border-right: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
      overflow-y: auto;
    }
    #statistics-panel {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }
    #statistics-panel h2 {
      margin-bottom: 12px;
      color: #fff;
    }
    .stat-section {
      margin-bottom: 16px;
      background: rgba(40, 40, 40, 0.8);
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #555;
    }
    .stat-section summary {
      list-style: none;
      cursor: pointer;
      margin-bottom: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }
    .stat-section summary::-webkit-details-marker {
      display: none;
    }
    .stat-section summary::before {
      content: "▸";
      display: inline-block;
      margin-right: 8px;
      color: #6bb0ff;
      transform: translateY(-1px);
    }
    .stat-section[open] summary::before {
      content: "▾";
    }
    .stat-section summary + * {
      margin-top: 8px;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-item {
      background: rgba(50, 50, 50, 0.8);
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #666;
    }
    .stat-item-label {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-item-value {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      text-align: right;
    }
    .stat-item-value.left {
      text-align: left;
    }
    .file-type-table,
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .file-type-table th,
    .file-type-table td,
    .stats-table th,
    .stats-table td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #555;
    }
    .file-type-table .num {
      text-align: right;
    }
    .stats-table .num {
      text-align: right;
    }
    .file-type-table th,
    .stats-table th {
      background: rgba(50, 50, 50, 0.8);
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    .stats-table[data-all-files-table="true"] th {
      cursor: pointer;
      user-select: none;
    }
    .stats-table[data-all-files-table="true"] th.is-active {
      color: #6bb0ff;
    }
    .file-type-table[data-file-type-table="true"] th {
      cursor: pointer;
      user-select: none;
    }
    .file-type-table[data-file-type-table="true"] th.is-active {
      color: #6bb0ff;
    }
    .file-type-table td,
    .stats-table td {
      color: #e0e0e0;
    }
    .file-type-table tr:hover,
    .stats-table tr:hover {
      background: rgba(60, 60, 60, 0.5);
    }
    .file-type-table .file-type {
      font-weight: 600;
      color: #4a9eff;
    }
    .stats-subtitle {
      margin-top: 10px;
      margin-bottom: 6px;
      font-size: 11px;
      color: #bdbdbd;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .excluded-list {
      margin-top: 10px;
      padding-left: 18px;
    }
    .excluded-list li {
      margin: 4px 0;
      color: #cfcfcf;
    }
    .excluded-empty {
      color: #aaa;
      font-style: italic;
    }
    .no-data {
      text-align: center;
      padding: 40px;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>Project Statistics</h1>
      <a href="index.html">← Back to Main App</a>
    </div>
    <div id="content">
      <div id="tweakpane-container"></div>
      <div id="statistics-panel">
        <div class="no-data">Select a statistics file from the panel on the left</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/apps/statistics/index.ts"></script>
</body>
</html>
