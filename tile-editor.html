<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tile Editor - Grid Drawing App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #header {
      padding: 20px;
      border-bottom: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
    }
    #header h1 {
      margin-bottom: 10px;
      color: #fff;
    }
    #header a {
      color: #4a9eff;
      text-decoration: none;
    }
    #header a:hover {
      color: #6bb0ff;
      text-decoration: underline;
    }
    #content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #tweakpane-container {
      width: 300px;
      border-right: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
      overflow-y: auto;
    }
    #editpane-container {
      width: 300px;
      border-left: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
      overflow-y: auto;
      display: none;
    }
    #editor-panel {
      flex: 1;
      padding: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #editor-panel h2 {
      margin-bottom: 0;
      color: #fff;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    #toggle-values {
      background: none;
      border: none;
      color: #aaa;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
      padding: 5px;
    }
    #toggle-values.collapsed {
      transform: rotate(-90deg);
    }
    .value-display {
      background: rgba(50, 50, 50, 0.8);
      padding: 20px;
      border-radius: 6px;
      border: 1px solid #666;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      overflow: hidden;
      max-height: 500px; /* Approximate max height */
      opacity: 1;
    }
    .values-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }
    .values-column {
      background: rgba(30, 30, 30, 0.6);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 12px;
      min-width: 0;
    }
    .column-header {
      color: #fff;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }
    .value-display.collapsed {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-bottom: 0;
      opacity: 0;
      border: none;
    }
    .value-row {
      display: flex;
      margin-bottom: 10px;
      align-items: baseline;
    }
    .value-row:last-child {
      margin-bottom: 0;
    }
    .value-label {
      width: 150px;
      color: #aaa;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    .value-content {
      font-family: monospace;
      font-size: 16px;
      color: #fff;
    }
    .error {
      color: #ff6b6b;
    }
    .value-content.error {
      color: #ff6b6b;
    }
    .constants-block {
      padding: 12px;
      border-top: 1px solid #333;
    }
    .constants-label {
      display: block;
      margin-bottom: 6px;
      color: #aaa;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    .constants-input {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border-radius: 4px;
      border: 1px solid #555;
      background: #222;
      color: #e0e0e0;
      padding: 8px;
      font-family: monospace;
      font-size: 12px;
    }
    .constants-button {
      width: 100%;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #2b2b2b;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 12px;
      text-align: center;
    }
    .expression-invalid input,
    .expression-invalid textarea {
      color: #ff6b6b;
      border-color: #ff6b6b;
    }
    @media (max-width: 1200px) {
      .values-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 700px) {
      .values-grid {
        grid-template-columns: 1fr;
      }
      .value-label {
        width: 120px;
      }
    }
    .canvas-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      margin-top: 20px;
    }
    #pixi-container {
      flex: 1;
      width: 100%;
      border: 1px solid #555;
      border-radius: 6px;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>Tile Editor</h1>
      <a href="index.html">← Back to Main App</a>
    </div>
    <div id="content">
      <div id="tweakpane-container"></div>
      <div id="editor-panel">
        <div class="section-header">
          <h2>Current Values</h2>
          <button id="toggle-values" aria-label="Toggle values display">▼</button>
        </div>
        <div id="values-display" class="value-display">
          <!-- Values will be injected here -->
        </div>
        
        <div class="canvas-section">
          <h2>Unit Cell Editor</h2>
          <div id="pixi-container"></div>
        </div>
      </div>
      <div id="editpane-container"></div>
    </div>
  </div>
  <script type="module" src="/src/apps/tile-editor/index.ts"></script>
</body>
</html>
