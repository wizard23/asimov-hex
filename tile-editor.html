<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tile Editor - Grid Drawing App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #header {
      padding: 20px;
      border-bottom: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
    }
    #header h1 {
      margin-bottom: 10px;
      color: #fff;
    }
    #header a {
      color: #4a9eff;
      text-decoration: none;
    }
    #header a:hover {
      color: #6bb0ff;
      text-decoration: underline;
    }
    #content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #tweakpane-container {
      width: 300px;
      border-right: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
      overflow-y: auto;
    }
    #editpane-container {
      width: 300px;
      border-left: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
      overflow-y: auto;
      display: none;
    }
    #editor-panel {
      flex: 1;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    #toggle-values {
      background: none;
      border: none;
      color: #aaa;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
      padding: 5px;
    }
    #toggle-values.collapsed {
      transform: rotate(-90deg);
    }
    .value-display {
      background: rgba(50, 50, 50, 0.8);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #666;
      margin-bottom: 12px;
      transition: all 0.3s ease;
      overflow: hidden;
      max-height: 500px; /* Approximate max height */
      opacity: 1;
    }
    .values-grid {
      display: grid;
      grid-template-columns: auto auto auto auto;
      gap: 10px;
    }
    .values-column {
      background: rgba(30, 30, 30, 0.6);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px;
      min-width: 0;
    }
    .values-column:not(.values-column-compact) {
      display: grid;
      grid-template-columns: max-content 1fr;
      column-gap: 8px;
      row-gap: 6px;
    }
    .values-column-compact {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr);
      column-gap: 12px;
      row-gap: 6px;
    }
    .column-header {
      color: #fff;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }
    .values-column:not(.values-column-compact) .column-header {
      grid-column: 1 / -1;
    }
    .values-column-compact .column-header {
      grid-column: 1 / -1;
    }
    .value-display.collapsed {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-bottom: 0;
      opacity: 0;
      border: none;
    }
    .value-row {
      display: contents;
    }
    .values-column-compact .value-row {
      display: contents;
    }
    .value-row:last-child {
      margin-bottom: 0;
    }
    .value-label {
      color: #aaa;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
      align-self: baseline;
    }
    .value-content {
      font-family: monospace;
      font-size: 16px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      align-self: baseline;
    }
    .error {
      color: #ff6b6b;
    }
    .expression-invalid input,
    .expression-invalid textarea {
      color: #ff6b6b;
      border-color: #ff6b6b;
    }
    @media (max-width: 1200px) {
      .values-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 700px) {
      .values-grid {
        grid-template-columns: 1fr;
      }
      .value-label {
        width: 120px;
      }
    }
    .canvas-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #values-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 3;
      pointer-events: none;
      padding: 20px;
    }
    #values-overlay .section-header,
    #values-overlay .value-display {
      pointer-events: auto;
    }
    #pixi-container {
      flex: 1;
      width: 100%;
      border: 1px solid #555;
      border-radius: 6px;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>Tile Editor</h1>
      <a href="index.html">← Back to Main App</a>
    </div>
    <div id="content">
      <div id="tweakpane-container"></div>
      <div id="editor-panel">
        <div id="values-overlay">
          <div class="section-header">
            <button id="toggle-values" aria-label="Toggle values display">▼</button>
          </div>
          <div id="values-display" class="value-display">
            <!-- Values will be injected here -->
          </div>
        </div>
        <div class="canvas-section">
          <div id="pixi-container"></div>
        </div>
      </div>
      <div id="editpane-container"></div>
    </div>
  </div>
  <script type="module" src="/src/apps/tile-editor/index.ts"></script>
</body>
</html>
