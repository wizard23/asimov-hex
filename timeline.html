<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Timeline - Grid Drawing App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #header {
      padding: 20px;
      border-bottom: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
    }
    #header h1 {
      margin-bottom: 10px;
      color: #fff;
    }
    #header a {
      color: #4a9eff;
      text-decoration: none;
    }
    #header a:hover {
      color: #6bb0ff;
      text-decoration: underline;
    }
    #content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #tweakpane-container {
      width: 300px;
      border-right: 1px solid #555;
      background: rgba(30, 30, 30, 0.95);
      overflow-y: auto;
    }
    #timeline-panel {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    #timeline-panel h2 {
      margin-bottom: 20px;
      color: #fff;
    }
    #timeline-panel.timeline-mode {
      padding: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #timeline-panel.timeline-mode h2 {
      margin-bottom: 12px;
    }
    .timeline-canvas-container {
      flex: 1;
      position: relative;
      border: 1px solid #555;
      border-radius: 8px;
      background: rgba(20, 20, 20, 0.9);
      overflow: hidden;
    }
    #timeline-canvas {
      width: 100%;
      height: 100%;
    }
    .timeline-info {
      margin-top: 12px;
      flex: 0 0 auto;
    }
    .hover-debug {
      position: absolute;
      top: 12px;
      left: 320px;
      padding: 6px 10px;
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 12px;
      color: #e0e0e0;
      z-index: 5;
      pointer-events: none;
    }
    .commit-item-empty {
      text-align: center;
      color: #888;
      font-style: italic;
    }
    .commit-item {
      background: rgba(50, 50, 50, 0.8);
      padding: 15px;
      border-radius: 6px;
      border: 1px solid #666;
      margin-bottom: 15px;
    }
    .commit-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      color: #aaa;
    }
    .commit-message {
      font-size: 16px;
      color: #fff;
      margin-bottom: 8px;
      white-space: pre-wrap;
    }
    .commit-stats {
      font-size: 12px;
      color: #aaa;
    }
    .added { color: #4caf50; }
    .removed { color: #f44336; }
    
    .no-data {
      text-align: center;
      padding: 40px;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>Project Timeline</h1>
      <a href="index.html">← Back to Main App</a>
    </div>
    <div id="content">
      <div id="tweakpane-container"></div>
      <div id="timeline-panel">
        <div class="no-data">Loading timeline...</div>
      </div>
    </div>
    <div id="hover-debug" class="hover-debug">not hovering over a commit</div>
  </div>
  <script type="module" src="/src/apps/timeline/index.ts"></script>
</body>
</html>
